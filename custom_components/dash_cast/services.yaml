load_url:
  name: "Load URL"
  description: "Cast a website URL to a Google Chromecast device using DashCast"
  fields:
    entity_id:
      name: "Entity"
      description: "Media player entity from the Google Cast integration"
      required: true
      selector:
        entity:
          integration: cast
          domain: media_player
    url:
      name: "URL"
      description: "The website URL to cast"
      example: https://www.home-assistant.io/
      required: true
      selector:
        text:
    force:
      name: "Force"
      description: "Use this option if iframe blocking is enabled on the target site"
      default: false
      selector:
        boolean:
    reload_seconds:
      name: "Reload seconds"
      description: "Automatically reload the page every X seconds (0 to disable)"
      default: 0
      selector:
        number:
          min: 0
          max: 10000
          unit_of_measurement: seconds
          mode: box
